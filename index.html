<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Analiz v4 | Şeftali Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- FORM EKRANI -->
        <div id="auth-container">
            <header>
                <h1>Güvenlik Analizörü v4</h1>
                <p>Yapay zeka destekli davranış takibi aktif.</p>
            </header>

            <!-- 1. ADIM: Mail Girişi -->
            <div class="step">
                <label>E-posta Adresi</label>
                <input type="email" id="user-email" placeholder="kullanici@mail.com" autocomplete="off">
            </div>

            <!-- 2. ADIM: Matematik Testi (Hız Kontrolü İçin) -->
            <div class="step">
                <label id="math-question">Matematik Sorusu Yükleniyor...</label>
                <input type="number" id="math-answer" placeholder="Sonuç?">
                <p class="input-hint">İşlem hızı analiz edilir.</p>
            </div>

            <!-- 3. ADIM: Captcha -->
            <div class="step">
                <div id="captcha-container">
                    <div id="captcha-box">------</div>
                    <button type="button" onclick="generateCaptcha()" class="refresh-btn">🔄</button>
                </div>
                <input type="text" id="user-input" placeholder="Güvenlik Kodu" maxlength="6">
            </div>

            <!-- 4. ADIM: Geniş Fare Analiz Alanı -->
            <div class="step">
                <div id="mouse-check-area">
                    <span>FARE ANALİZ ALANI</span>
                    <div id="progress-bar-bg">
                        <div id="progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- BOT TUZAĞI (Görünmez Buton) -->
            <button id="trap-button" tabindex="-1" onclick="triggerTrap()" style="opacity: 0.001; position: absolute; top: 0; left: 0; width: 1px; height: 1px;">
                Gizli Doğrulama
            </button>

            <div class="action-area">
                <button onclick="processFinalVerification()" class="verify-btn" id="main-btn">
                    ANALİZİ TAMAMLA
                </button>
            </div>
        </div>

        <!-- SONUÇ EKRANI -->
        <div id="status-screen" class="hidden">
            <h2 id="final-status-title">Analiz Sonucu</h2>
            <div id="score-card">
                <p id="final-status-desc"></p>
                <hr style="margin: 15px 0; opacity: 0.1;">
                <p id="mail-analysis" style="font-weight: bold; margin-bottom: 10px;"></p>
                <div id="score-display"></div>
            </div>
            <button onclick="location.reload()" class="retry-btn">Başa Dön</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
